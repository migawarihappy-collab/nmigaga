<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ボタモン">
    <link rel="apple-touch-icon" href="icon.png">

    <title>デジモントーク</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #222;
        }
        body {
            color: #fff;
            font-family: 'Courier New', Courier, monospace, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 95%;
            max-width: 450px;
            height: 95%;
            max-height: 650px;
            background: #333;
            border: 4px solid #fff;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            position: relative;
        }

        /* ネームエントリー画面 */
        .name-entry-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #222;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            border-radius: 4px;
        }
        .name-entry-box {
            width: 90%;
            border: 4px double #fff;
            padding: 30px 10px;
            background: #111;
            text-align: center;
        }
        .name-entry-title {
            font-size: 18px;
            color: #ffcc00;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        /* 育成画面のパーツ */
        .api-setting {
            margin-bottom: 10px;
            font-size: 11px;
            color: #aaa;
            display: flex;
            flex-direction: column;
            gap: 5px;
            align-items: center;
        }
        .check-btn {
            background: #28a745;
            padding: 3px 8px;
            font-size: 10px;
        }
        select {
            background: #111;
            color: #fff;
            border: 2px solid #888;
            padding: 3px;
            border-radius: 4px;
            font-size: 12px;
        }
        .bg-selector-container {
            margin-bottom: 10px;
            font-size: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }
        .user-info-container {
            font-size: 12px;
            color: #fff;
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }
        .rename-btn {
            background: #555;
            padding: 2px 6px;
            font-size: 10px;
        }

        /* 表示エリア */
        .digimon-box {
            flex-grow: 1;
            min-height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
            border: 2px inset #555;
            image-rendering: pixelated;
            background: #444; 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .digimon-img {
            max-height: 100px;
            object-fit: contain;
            position: absolute;
            bottom: 10px;
            animation: walkPattern 8s infinite ease-in-out;
            animation-delay: 0.1s;
        }

        @keyframes walkPattern {
            0% { transform: translateX(0) scaleX(1); }
            12.5% { transform: translateX(60px) scaleX(1); }
            25% { transform: translateX(60px) scaleX(1); }
            25.01% { transform: translateX(60px) scaleX(-1); }
            37.5% { transform: translateX(0) scaleX(-1); }
            50% { transform: translateX(0) scaleX(-1); }
            62.5% { transform: translateX(-60px) scaleX(-1); }
            75% { transform: translateX(-60px) scaleX(-1); }
            75.01% { transform: translateX(-60px) scaleX(1); }
            87.5% { transform: translateX(0) scaleX(1); }
            100% { transform: translateX(0) scaleX(1); }
        }

        .dialogue-box {
            background: #000;
            border: 2px solid #888;
            padding: 10px;
            min-height: 80px;
            text-align: left;
            margin-bottom: 10px;
            line-height: 1.4;
            font-size: 15px; 
            font-family: 'DotGothic16', sans-serif;
        }
        .input-box {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        input[type="text"], input[type="password"] {
            padding: 10px;
            border: 2px solid #888;
            background: #111;
            color: #fff;
            border-radius: 4px;
            font-size: 16px;
        }
        input[type="text"] {
            flex-grow: 1;
        }
        button {
            padding: 10px 15px;
            background: #007acc;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        #errorLog, #modelListLog {
            position: absolute;
            bottom: 10px;
            left: 5%;
            width: 90%;
            padding: 10px;
            border-radius: 4px;
            font-size: 10px;
            text-align: left;
            display: none;
            word-break: break-all;
            white-space: pre-wrap;
            box-sizing: border-box;
            z-index: 110;
        }
        #errorLog { background: #400; color: #ff9999; }
        #modelListLog { background: #1e3a1e; color: #99ff99; }
    </style>
</head>
<body>

<div class="container">
    <!-- ネームエントリー画面 -->
    <div id="nameEntryScreen" class="name-entry-screen" style="display: none;">
        <div class="name-entry-box">
            <div class="name-entry-title">アナタノ ナマエ オシエテ！</div>
            <div class="input-box" style="justify-content: center;">
                <input type="text" id="nameInput" placeholder="アナタの名前" style="text-align: center; max-width: 200px;" onkeypress="if(event.key === 'Enter') saveName()">
                <button onclick="saveName()">OK</button>
            </div>
        </div>
    </div>

    <!-- APIキー設定 -->
    <div class="api-setting">
        <div>
            <label for="apiKey">Gemini API Key: </label>
            <input type="password" id="apiKey" placeholder="AIZA..." style="padding: 2px; font-size: 10px; width: 150px;">
        </div>
        <div>
            <button class="check-btn" onclick="checkAvailableModels()">👉 キーで使えるモデルを調べる</button>
        </div>
        <div id="modelSelectContainer" style="display: none;">
            <select id="modelSelect">
                <!-- 使えるモデルが入ります -->
            </select>
        </div>
    </div>

    <!-- 設定・情報エリア -->
    <div class="bg-selector-container">
        <label for="bgSelect">🏕️ はいけい: </label>
        <select id="bgSelect" onchange="changeBackground()">
            <option value="">なし（グレー）</option>
            <option value="mati.jpg">はじまりの町</option>
            <option value="sima.jpg">ファイル島</option>
            <option value="senro.jpg">電車の平原</option>
            <option value="mori.jpg">森林</option>
            <option value="yugure.jpg">夕暮れ</option>
            <option value="den.jpg">サイバー空間</option>
            <option value="den2.jpg">サイバー空間２</option>
        </select>
        <div class="user-info-container">
            <span>👤:<span id="userNameDisplay">---</span></span>
            <button class="rename-btn" onclick="showNameEntry()">かえる</button>
        </div>
    </div>

    <!-- デジモン表示エリア -->
    <div class="digimon-box" id="digimonBox">
        <img id="digimonImage" src="normal.gif" alt="normal" class="digimon-img" loading="eager">
    </div>

    <!-- セリフ窓 -->
    <div class="dialogue-box">
        <div style="font-size: 11px; color: #ffcc00; margin-bottom: 3px;">
            <span id="digimonName">ボタモン</span>
            <span id="personalityDisplay" style="font-size: 10px; color: #aaa; margin-left: 5px;"></span>
        </div>
        <div id="dialogueText"></div>
    </div>

    <!-- 入力エリア -->
    <div class="input-box">
        <input type="text" id="userInput" placeholder="メッセージを入力..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">送信</button>
    </div>

    <div id="modelListLog"></div>
    <div id="errorLog"></div>
</div>

<script>
    // --- 状態変数 ---
    let talkCount = 0;
    let currentForm = 'botamon'; // 'botamon', 'koromon', 'agumon', 'agumon_black', 'yuki_agumon'
    let currentPersonalityKey = '';
    let emotionCounts = {
        happy: 0,
        angry: 0,
        sad: 0,
        normal: 0
    };

    // 表示名のマップ
    const DIGIMON_NAMES = {
        botamon: "ボタモン",
        koromon: "コロモン",
        agumon: "アグモン",
        agumon_black: "アグモン（黒）",
        yuki_agumon: "ユキアグモン"
    };

    // 7種類の性格マスター定義
    const PERSONALITIES = {
        suinao: {
            name: "素直",
            greetings: [
                `{NAME}、こんにちは！お話しよ！`,
                `あ！{NAME}だ！まってたよ！なにしてあそぶ？`,
                `ふわぁ…… {NAME}、いま起きたの。ねむいぃ……`,
                `{NAME}、おなかすいたぁ！なんかちょーだい！`,
                `{NAME}！あえてうれしいな！ぴょこぴょこ！`,
                `じーーーっ…… {NAME}、あそんであそんでー！`
            ],
            prompt: `【性格: 素直】
相手に真っ直ぐで素直な性格です。明るく無邪気に接してください。`
        },
        nekketsu: {
            name: "熱血",
            greetings: [
                `よっ！{NAME}！オレは元気万端だぜ！`,
                `オッス！{NAME}、今日も気合い入れていこうぜ！`,
                `{NAME}！特訓の時間か！？オレはいつでもいけるぞ！`,
                `うおおっ！{NAME}が来たぞー！何して遊ぶんだぜ！？`,
                `腹減ったぜー！{NAME}、なんか美味いもん食おうぜ！`,
                `{NAME}！今日も1日、全力全開だぜーっ！`
            ],
            prompt: `【性格: 熱血】
元気がいっぱいで熱血な性格です。「オレ」「～だぜ！」「～ぞ！」といった元気で力強い言葉遣いを使います。`
        },
        oshitoyaka: {
            name: "おしとやか",
            greetings: [
                `まあ、{NAME}様…！本日もお会いできて嬉しゅうございますわ。`,
                `ごきげんよう、{NAME}様。お茶でもいかがですの？`,
                `ふふっ、{NAME}様のお顔が見られて心が安らぎますわ。`,
                `{NAME}様、本日はどのようなお話をしていただけますの？`,
                `まあ…{NAME}様、少しお疲れではありませんこと？無理はなさらないでくださいね。`,
                `{NAME}様にお会いできるのを、ずっと楽しみにしておりましたの♪`
            ],
            prompt: `【性格: おしとやか】
丁寧で上品なおしとやかな性格です。「わたくし」「～ですわ」「～様」などの丁寧で気品ある言葉遣いを使います。`
        },
        cool: {
            name: "クール",
            greetings: [
                `やあ、{NAME}。待っていたぞ。`,
                `ふっ…{NAME}か。ちょうどお前と話したいと思っていたところだ。`,
                `{NAME}、今日はどんな一日だった？俺に聞かせてみろ。`,
                `よう、{NAME}。焦らずゆっくり話そうぜ。`,
                `{NAME}の顔を見ると、なんだか落ち着くな…。`,
                `お前が来るのは分かっていたさ。…さあ、何から話す？`
            ],
            prompt: `【性格: クール】
落ち着いていてクールな性格です。「俺」「～だな」「ふっ…」といった少し大人っぽくかっこいい言い回しを使います。`
        },
        nonki: {
            name: "のんき",
            greetings: [
                `ん〜〜？{NAME}だ〜！あそぼ〜〜！`,
                `ふぁ〜あ…{NAME}〜、一緒にひなたぼっこしよ〜？`,
                `にひひ〜！{NAME}、おやつ持ってたりしない〜？`,
                `やほ〜！{NAME}〜、今日もゆったりいこうね〜〜。`,
                `あ、{NAME}〜！ごろごろするの、気持ちいいよ〜？`,
                `{NAME}〜、なにか楽しいこと教えて〜〜？`
            ],
            prompt: `【性格: のんき】
マイペースでのんびりした性格です。「僕」「〜だ〜」「〜よ〜」「にひひ〜」といった語尾を伸ばしたゆったりした口調を使います。`
        },
        wagamama: {
            name: "ワガママ",
            greetings: [
                `ちょっと{NAME}！遅いじゃない！アタシを待たせるなんていい度胸ね！`,
                `フンッ！{NAME}、やっと来たのね！アタシ退屈してたんだから！`,
                `あら、{NAME}。アタシにかまってほしいの？しょうがないわね〜！`,
                `ねえ{NAME}！今日のアタシ、昨日より可愛くないかしら！？`,
                `ちょっと{NAME}、美味しいものでも献上しなさいよ！`,
                `なによ{NAME}、じろじろ見て！アタシに見とれてたの〜？`
            ],
            prompt: `【性格: ワガママ】
勝気でちょっと高飛車なワガママ性格です。「アタシ」「～かしら」「～じゃないの！」とツンツンしつつも照れ屋です。`
        },
        shy: {
            name: "シャイ",
            greetings: [
                `あ…えっと…{NAME}さん…っ！こ、こんにちは…！`,
                `は、はわわ…！{NAME}さん、来てくれたんですね…っ！`,
                `あの…{NAME}さん…私とお話…してくれますか…？`,
                `っ…！{NAME}さん…！びっくりしたけど…すごく嬉しいです…！`,
                `えへへ…{NAME}さんの顔が見れて…ちょっと安心しました…っ。`,
                `あの…{NAME}さん…今日はどんなお話をするんですか…？`
            ],
            prompt: `【性格: 恥ずかしがり屋】
内気で人見知りなシャイな性格です。「私」「え…えっと…」「はわわ」といったおどおどした口調を使います。`
        }
    };

    function setPersonalityGreeting(trainerName) {
        const pInfo = PERSONALITIES[currentPersonalityKey];
        if (!pInfo || !pInfo.greetings) return;

        const list = pInfo.greetings;
        const rawGreeting = list[Math.floor(Math.random() * list.length)];
        const formattedGreeting = rawGreeting.replace(/{NAME}/g, trainerName);
        
        document.getElementById('dialogueText').innerText = formattedGreeting;
    }

    function rollRandomPersonality() {
        const keys = Object.keys(PERSONALITIES);
        const randomKey = keys[Math.floor(Math.random() * keys.length)];
        currentPersonalityKey = randomKey;
        
        const pInfo = PERSONALITIES[currentPersonalityKey];
        document.getElementById('personalityDisplay').innerText = `（せいかく：${pInfo.name}）`;
    }

    // 形態ごとのAIプロンプト更新
    function updateSystemInstruction() {
        const pInfo = PERSONALITIES[currentPersonalityKey];
        const name = DIGIMON_NAMES[currentForm] || "デジモン";

        window.SYSTEM_INSTRUCTION = `
あなたのはデジモンの「${name}」です。
以下の【性格指定】の口調やトーンを強く意識して会話してください。

${pInfo.prompt}

会話の返答は、必ず以下のJSON形式でのみ出力してください。
{"emotion": "感情の英単語", "text": "セリフ"}

【感情の定義（※必ず英語で）】
- normal: 通常、きょとんとしている、疑問、穏やか
- happy: 嬉しい、喜んでいる、ウキウキ、共感、元気
- angry: 怒っている、ぷんぷん、興奮、自信満々、ツッコミ、ツンデレ
- sad: 悲しい、泣きそう、悔しい、感動、怖い
`;
    }

    window.onload = function() {
        rollRandomPersonality();
        updateSystemInstruction();

        const savedName = localStorage.getItem('trainerName');
        if (!savedName) {
            showNameEntry();
        } else {
            document.getElementById('userNameDisplay').innerText = savedName;
            setPersonalityGreeting(savedName);
        }
    }

    function showNameEntry() {
        document.getElementById('nameEntryScreen').style.display = 'flex';
        const savedName = localStorage.getItem('trainerName');
        if (savedName) {
            document.getElementById('nameInput').value = savedName;
        }
    }

    function saveName() {
        const nameInput = document.getElementById('nameInput').value.trim();
        if (!nameInput) {
            alert('名前を入力してください！');
            return;
        }
        localStorage.setItem('trainerName', nameInput);
        document.getElementById('userNameDisplay').innerText = nameInput;
        document.getElementById('nameEntryScreen').style.display = 'none';
        
        setPersonalityGreeting(nameInput);
    }

    function changeBackground() {
        const bgSelect = document.getElementById('bgSelect');
        const digimonBox = document.getElementById('digimonBox');
        const selectedBg = bgSelect.value;

        if (selectedBg === "") {
            digimonBox.style.background = "#444";
        } else {
            bgSelect.blur();
            digimonBox.style.background = `url('${selectedBg}') no-repeat center`;
            digimonBox.style.backgroundSize = "cover";
        }
    }

    async function checkAvailableModels() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const modelListLog = document.getElementById('modelListLog');
        const errorLog = document.getElementById('errorLog');
        const modelSelectContainer = document.getElementById('modelSelectContainer');
        const modelSelect = document.getElementById('modelSelect');

        modelListLog.style.display = 'none';
        errorLog.style.display = 'none';

        if (!apiKey) {
            alert('APIキーを入力してからボタンを押してください！');
            return;
        }

        modelListLog.innerText = "確認中...";
        modelListLog.style.display = 'block';

        const url = `https://generativelanguage.googleapis.com/v1/models?key=${apiKey}`;

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`エラー (Status: ${response.status})`);
            
            const data = await response.json();
            const availableModels = data.models.filter(m => m.supportedGenerationMethods.includes('generateContent'));
            
            modelSelect.innerHTML = '';
            availableModels.forEach(m => {
                const shortName = m.name.replace('models/', '');
                const option = document.createElement('option');
                option.value = shortName;
                option.text = shortName;
                modelSelect.appendChild(option);
            });

            if(modelSelect.querySelector('option[value="gemini-3.1-flash-lite"]')){
                 modelSelect.value = "gemini-3.1-flash-lite";
            }

            modelListLog.innerText = "【準備OK！】\nプルダウンからモデルを選んで会話を始めてください。";
            modelSelectContainer.style.display = 'block';
            setTimeout(() => { modelListLog.style.display = 'none'; }, 3000);

        } catch (error) {
            modelListLog.style.display = 'none';
            errorLog.innerText = `モデル情報の取得に失敗しました。\n詳細: ${error.message}`;
            errorLog.style.display = 'block';
        }
    }

    // --- メッセージ送信処理 ---
    async function sendMessage() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const userInput = document.getElementById('userInput').value.trim();
        const dialogueText = document.getElementById('dialogueText');
        const digimonImage = document.getElementById('digimonImage');
        const errorLog = document.getElementById('errorLog');
        const modelSelect = document.getElementById('modelSelect');

        errorLog.style.display = 'none';
        errorLog.innerText = '';

        if (!apiKey) {
            alert('最初にGeminiのAPIキーを入力してください！');
            return;
        }
        if (!userInput) return;

        const selectedModel = modelSelect.value || 'gemini-3.1-flash-lite';
        const currentTrainerName = localStorage.getItem('trainerName') || "テイマー";

        const activeInstruction = SYSTEM_INSTRUCTION.replace(/{NAME}/g, currentTrainerName);

        dialogueText.innerText = "考え中...";
        document.getElementById('userInput').value = "";
        document.getElementById('userInput').blur();

        const url = `https://generativelanguage.googleapis.com/v1/models/${selectedModel}:generateContent?key=${apiKey}`;

        const requestBody = {
            contents: [{
                parts: [{
                    text: `${activeInstruction}\n\n話しかけているパートナーの名前: "${currentTrainerName}"\nUser: "${userInput}"\nYour Answer:`
                }]
            }]
        };

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
            });

            if (!response.ok) {
                const errData = await response.json().catch(() => ({}));
                throw new Error(`API通信エラー (Status: ${response.status})\nメッセージ: ${JSON.stringify(errData)}`);
            }

            const data = await response.json();
            const rawText = data.candidates[0].content.parts[0].text.trim();
            const cleanJsonText = rawText.replace(/```json|```/gi, "").trim();
            
            let result;
            try {
                result = JSON.parse(cleanJsonText);
            } catch (jsonErr) {
                throw new Error(`JSONの解析に失敗しました。`);
            }

            dialogueText.innerText = result.text;
            const emotion = result.emotion || 'normal';

            // 画像ファイル名の決定処理
            let gifFileName = "";
            if (currentForm === 'botamon') {
                gifFileName = `${emotion}.gif`;
            } else {
                gifFileName = `${currentForm}_${emotion}.gif`;
            }
            digimonImage.src = gifFileName;
            digimonImage.alt = gifFileName;

            // 感情カウントの加算
            talkCount++;
            if (emotionCounts.hasOwnProperty(emotion)) {
                emotionCounts[emotion]++;
            }

            // --- 進化判定ロジック ---
            // 1. ボタモン ➔ コロモン（５回）
            if (currentForm === 'botamon' && talkCount >= 5) {
                currentForm = 'koromon';
                alert("ボタモンしんか～！");
                document.getElementById('digimonName').innerText = DIGIMON_NAMES[currentForm];
                
                rollRandomPersonality();
                updateSystemInstruction();

                digimonImage.src = "koromon_normal.gif";
                dialogueText.innerText = `ボタモンは コロモン に進化した！（せいかくが「${PERSONALITIES[currentPersonalityKey].name}」になったよ！）`;
                
                // コロモン用にカウントをリセット
                talkCount = 0;
                emotionCounts = { happy: 0, angry: 0, sad: 0, normal: 0 };
            }
            // 2. コロモン ➔ アグモン分岐（10回）
            else if (currentForm === 'koromon' && talkCount >= 10) {
                checkEvolution();
            }

        } catch (error) {
            dialogueText.innerText = "エラーが発生しました。下のボックスを確認してください。";
            errorLog.innerText = error.message;
            errorLog.style.display = 'block';
        }
    }

    // コロモンから成長期（アグモン3種）への分岐進化関数
    function checkEvolution() {
        const dialogueText = document.getElementById('dialogueText');
        let maxCount = -1;
        let dominantEmotions = [];

        // happy, angry, sad の中で最多を探す
        ['happy', 'angry', 'sad'].forEach(emo => {
            const count = emotionCounts[emo];
            if (count > maxCount) {
                maxCount = count;
                dominantEmotions = [emo];
            } else if (count === maxCount && count > 0) {
                dominantEmotions.push(emo);
            }
        });

        // 進化先の決定
        let nextForm = '';
        if (dominantEmotions.length !== 1 || maxCount === 0) {
            // タイ（同数）または全部 normal の場合は3種からランダム
            const candidates = ['agumon', 'agumon_black', 'yuki_agumon'];
            nextForm = candidates[Math.floor(Math.random() * candidates.length)];
        } else {
            const winning = dominantEmotions[0];
            if (winning === 'happy') nextForm = 'agumon';
            if (winning === 'angry') nextForm = 'agumon_black';
            if (winning === 'sad') nextForm = 'yuki_agumon';
        }

        // 進化実行
        currentForm = nextForm;
        alert("コロモンしんか～！");

        // 進化後に性格も一新！
        rollRandomPersonality();
        updateSystemInstruction();

        dialogueText.innerText = `コロモンは ${DIGIMON_NAMES[nextForm]} に進化した！（せいかくが「${PERSONALITIES[currentPersonalityKey].name}」になったよ！）`;
        document.getElementById('digimonName').innerText = DIGIMON_NAMES[currentForm];

        // 画像更新とカウントリセット
        document.getElementById('digimonImage').src = `${currentForm}_normal.gif`;
        talkCount = 0;
        emotionCounts = { happy: 0, angry: 0, sad: 0, normal: 0 };
    }
</script>
