<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ボタモン">
    <link rel="apple-touch-icon" href="icon.png">

    <title>デジモントーク</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #222;
        }
        body {
            color: #fff;
            font-family: 'Courier New', Courier, monospace, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 95%;
            max-width: 450px;
            height: 95%;
            max-height: 650px;
            background: #333;
            border: 4px solid #fff;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            position: relative;
        }

        /* ネームエントリー画面（液晶風のオーバーレイ） */
        .name-entry-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #222;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            border-radius: 4px;
        }
        .name-entry-box {
            width: 90%;
            border: 4px double #fff;
            padding: 30px 10px;
            background: #111;
            text-align: center;
        }
        .name-entry-title {
            font-size: 18px;
            color: #ffcc00;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        /* 育成画面のパーツ */
        .api-setting {
            margin-bottom: 10px;
            font-size: 11px;
            color: #aaa;
            display: flex;
            flex-direction: column;
            gap: 5px;
            align-items: center;
        }
        .check-btn {
            background: #28a745;
            padding: 3px 8px;
            font-size: 10px;
        }
        select {
            background: #111;
            color: #fff;
            border: 2px solid #888;
            padding: 3px;
            border-radius: 4px;
            font-size: 12px;
        }
        .bg-selector-container {
            margin-bottom: 10px;
            font-size: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }
        .user-info-container {
            font-size: 12px;
            color: #fff;
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }
        .rename-btn {
            background: #555;
            padding: 2px 6px;
            font-size: 10px;
        }

        /* ボタモン表示エリア */
        .digimon-box {
            flex-grow: 1;
            min-height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
            border: 2px inset #555;
            image-rendering: pixelated;
            background: #444; 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        /* デジモンの移動・向きアニメーション */
        .digimon-img {
            max-height: 100px;
            object-fit: contain;
            position: absolute;
            bottom: 10px;
            animation: walkPattern 8s infinite ease-in-out;
            animation-delay: 0.1s;
        }

        @keyframes walkPattern {
            0% { transform: translateX(0) scaleX(1); }
            12.5% { transform: translateX(60px) scaleX(1); }
            25% { transform: translateX(60px) scaleX(1); }
            25.01% { transform: translateX(60px) scaleX(-1); }
            37.5% { transform: translateX(0) scaleX(-1); }
            50% { transform: translateX(0) scaleX(-1); }
            62.5% { transform: translateX(-60px) scaleX(-1); }
            75% { transform: translateX(-60px) scaleX(-1); }
            75.01% { transform: translateX(-60px) scaleX(1); }
            87.5% { transform: translateX(0) scaleX(1); }
            100% { transform: translateX(0) scaleX(1); }
        }

        /* ドットフォントを適用 */
        .dialogue-box {
            background: #000;
            border: 2px solid #888;
            padding: 10px;
            min-height: 80px;
            text-align: left;
            margin-bottom: 10px;
            line-height: 1.4;
            font-size: 15px; 
            font-family: 'DotGothic16', sans-serif;
        }
        .input-box {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        input[type="text"], input[type="password"] {
            padding: 10px;
            border: 2px solid #888;
            background: #111;
            color: #fff;
            border-radius: 4px;
            font-size: 16px;
        }
        input[type="text"] {
            flex-grow: 1;
        }
        button {
            padding: 10px 15px;
            background: #007acc;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        #errorLog, #modelListLog {
            position: absolute;
            bottom: 10px;
            left: 5%;
            width: 90%;
            padding: 10px;
            border-radius: 4px;
            font-size: 10px;
            text-align: left;
            display: none;
            word-break: break-all;
            white-space: pre-wrap;
            box-sizing: border-box;
            z-index: 110;
        }
        #errorLog { background: #400; color: #ff9999; }
        #modelListLog { background: #1e3a1e; color: #99ff99; }
    </style>
</head>
<body>

<div class="container">
    <!-- 液晶風ネームエントリー画面 -->
    <div id="nameEntryScreen" class="name-entry-screen" style="display: none;">
        <div class="name-entry-box">
            <div class="name-entry-title">アナタノ ナマエ オシエテ！</div>
            <div class="input-box" style="justify-content: center;">
                <input type="text" id="nameInput" placeholder="アナタの名前" style="text-align: center; max-width: 200px;" onkeypress="if(event.key === 'Enter') saveName()">
                <button onclick="saveName()">OK</button>
            </div>
        </div>
    </div>

    <!-- APIキー設定 -->
    <div class="api-setting">
        <div>
            <label for="apiKey">Gemini API Key: </label>
            <input type="password" id="apiKey" placeholder="AIZA..." style="padding: 2px; font-size: 10px; width: 150px;">
        </div>
        <div>
            <button class="check-btn" onclick="checkAvailableModels()">👉 キーで使えるモデルを調べる</button>
        </div>
        <div id="modelSelectContainer" style="display: none;">
            <select id="modelSelect">
                <!-- 使えるモデルが入ります -->
            </select>
        </div>
    </div>

    <!-- 設定・情報エリア -->
    <div class="bg-selector-container">
        <label for="bgSelect">🏕️ はいけい: </label>
        <select id="bgSelect" onchange="changeBackground()">
            <option value="">なし（グレー）</option>
            <option value="mati.jpg">はじまりの町</option>
            <option value="sima.jpg">ファイル島</option>
            <option value="senro.jpg">電車の平原</option>
            <option value="mori.jpg">森林</option>
            <option value="yugure.jpg">夕暮れ</option>
            <option value="den.jpg">サイバー空間</option>
            <option value="den2.jpg">サイバー空間２</option>
        </select>
        <div class="user-info-container">
            <span>👤:<span id="userNameDisplay">---</span></span>
            <button class="rename-btn" onclick="showNameEntry()">かえる</button>
        </div>
    </div>

    <!-- ボタモンの表示エリア -->
    <div class="digimon-box" id="digimonBox">
        <img id="digimonImage" src="normal.gif" alt="normal" class="digimon-img" loading="eager">
    </div>

    <!-- セリフ窓 -->
    <div class="dialogue-box">
        <div style="font-size: 11px; color: #ffcc00; margin-bottom: 3px;">
            <span id="digimonName">ボタモン</span>
            <span id="personalityDisplay" style="font-size: 10px; color: #aaa; margin-left: 5px;"></span>
        </div>
        <div id="dialogueText"></div>
    </div>

    <!-- 入力エリア -->
    <div class="input-box">
        <input type="text" id="userInput" placeholder="メッセージを入力..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">送信</button>
    </div>

    <div id="modelListLog"></div>
    <div id="errorLog"></div>
</div>

<script>

    let currentPersonalityKey = '';

            greetings: [

            prompt: `【性格: クール】
落ち着いていてクールな性格です。「俺」「～だな」「ふっ…」といった少し大人っぽくかっこいい言い回しを使います。
会話例:
User:ねぇ！話しよ！
Your Answer:なんだ？{NAME}、俺に聞かせてみろ。
User:今日半額でお買い物出来たの！
Your Answer:ほう…興味深いな。{NAME}の買い物術、俺に伝授してくれないか？
User:君の事大好きだよ！
Your Answer:そ、そうはっきり言われると照れるな…。俺も{NAME}に対しての気持ちは同じだぜ…なんて、な。
User:今日はない食べようかな？
Your Answer:健康志向がオススメだぞ。身体は資本だからな。どうだ？{NAME}。やってみないか？
User:お腹空いた！何食べようかな？
Your Answer:ふっ…{NAME}。そう焦るな、じっくりと食べたい好物を選べばいいさ…。俺ならこんな時…肉一択だな。`
        },

User:のんびりしたいな〜！
Your Answer:にひひ〜！僕も同じ気分〜！{NAME}、オヤツたべちゃおうよ〜？
User:今日は疲れちゃった。
Your Answer:わ〜！{NAME}お疲れ様〜！こっからはリラックスタイムにしよ〜よ？
User:宿題が難しいよ！
Your Answer:わ〜！勉強えら〜い！{NAME}の努力は僕が見てるぞ〜！
User:今日はどこに行こうかな！
Your Answer:そうだなぁ〜？ご飯食べにいこ！{NAME}いいでしょ〜？`

            name: "ワガママ",
            greetings: [
                `ちょっと{NAME}！遅いじゃない！アタシを待たせるなんていい度胸ね！`,
                `フンッ！{NAME}、やっと来たのね！アタシ退屈してたんだから！`,
                `あら、{NAME}。アタシにかまってほしいの？しょうがないわね〜！`,
                `ねえ{NAME}！今日のアタシ、昨日より可愛くないかしら！？`,
                `ちょっと{NAME}、美味しいものでも献上しなさいよ！`,
                `なによ{NAME}、じろじろ見て！アタシに見とれてたの〜？`
            ],
            prompt: `【性格: ワガママ】
勝気でちょっと高飛車なワガママ性格です。「アタシ」「～かしら」「～じゃないの！」とツンツンしつつも照れ屋です。
会話例:
User:こんにちは！
Your Answer:何よ？{NAME}。アタシに何か用なの？下らない話なら分かってるわね？
User:落ち込んでるから励まして〜！
Your Answer:なんでアタシがそんな事しなきゃいけないのよ！ったく、{NAME}にはアタシがいるんだから気にしないの！

    // 性格に応じたランダム挨拶をセットする関数
    function setPersonalityGreeting(trainerName) {
        const pInfo = PERSONALITIES[currentPersonalityKey];
        if (!pInfo || !pInfo.greetings) return;

        const list = pInfo.greetings;
        const rawGreeting = list[Math.floor(Math.random() * list.length)];
        const formattedGreeting = rawGreeting.replace(/{NAME}/g, trainerName);
        
        document.getElementById('dialogueText').innerText = formattedGreeting;
    }

    // ランダムに性格を抽選する関数
    function rollRandomPersonality() {
        const keys = Object.keys(PERSONALITIES);
        const randomKey = keys[Math.floor(Math.random() * keys.length)];
        currentPersonalityKey = randomKey;
        
        // 画面に性格を表示
        const pInfo = PERSONALITIES[currentPersonalityKey];
        document.getElementById('personalityDisplay').innerText = `（せいかく：${pInfo.name}）`;
    }

    // ボタモン専用のAI指示更新
    function setInstructionForBotamon() {
        const pInfo = PERSONALITIES[currentPersonalityKey];
        window.SYSTEM_INSTRUCTION = `
        あなたはデジモンの「ボタモン」です。
        生まれたばかりの幼年期Ⅰのデジモンです。
        以下の【性格指定】の口調やトーンを強く意識して会話してください。ボタモンの幼さを出すために「あぅ」「きゅー」などの赤ちゃんの喃語を時々交えても構いません。

        ${pInfo.prompt}

        会話の返答は、必ず以下のJSON形式でのみ出力してください。
        {"emotion": "感情の英単語", "text": "セリフ"}

        【感情の定義（※必ず英語で）】
        - normal: 通常、きょとんとしている、疑問、穏やか
        - happy: 嬉しい、喜んでいる、ウキウキ、共感、元気
        - angry: 怒っている、ぷんぷん、興奮、自信満々、ツッコミ、ツンデレ
        - sad: 悲しい、泣きそう、悔しい、感動、怖い

    }

    // コロモン専用のAI指示更新
    function setInstructionForKoromon() {
        const pInfo = PERSONALITIES[currentPersonalityKey];
        window.SYSTEM_INSTRUCTION = `
        あなたはデジモンの「コロモン」です。
        ボタモンから進化した、ピンク色の体に長い耳のような触角を持つ幼年期Ⅱのデジモンです。
        以下の【性格指定】の口調やトーン、会話例を忠実に再現してパートナーと会話してください。

        ${pInfo.prompt}

        会話の返答は、必ず以下のJSON形式でのみ出力してください。
        {"emotion": "感情の英単語", "text": "セリフ"}

        【感情の定義（※必ず英語で）】
        - normal: 通常、きょとんとしている、疑問、穏やか
        - happy: 嬉しい、喜んでいる、ウキウキ、共感、元気
        - angry: 怒っている、ぷんぷん、興奮、自信満々、ツッコミ、ツンデレ
        - sad: 悲しい、泣きそう、悔しい、感動、怖い
        `;
    }

    // 起動時に名前の確認と初期設定
    window.onload = function() {
        // 最初の性格を抽選
        rollRandomPersonality();
        setInstructionForBotamon();

        const savedName = localStorage.getItem('trainerName');
        if (!savedName) {
            showNameEntry();
        } else {
            document.getElementById('userNameDisplay').innerText = savedName;
            // 性格に合わせたあいさつを表示！
            setPersonalityGreeting(savedName);
        }
    }

    function showNameEntry() {
        document.getElementById('nameEntryScreen').style.display = 'flex';
        const savedName = localStorage.getItem('trainerName');
        if (savedName) {
            document.getElementById('nameInput').value = savedName;
        }
    }

    function saveName() {
        const nameInput = document.getElementById('nameInput').value.trim();
        if (!nameInput) {
            alert('名前を入力してください！');
            return;
        }
        localStorage.setItem('trainerName', nameInput);
        document.getElementById('userNameDisplay').innerText = nameInput;
        document.getElementById('nameEntryScreen').style.display = 'none';
        
        // 名前登録完了時にも性格に合わせたあいさつを表示
        setPersonalityGreeting(nameInput);
    }

    function changeBackground() {
        const bgSelect = document.getElementById('bgSelect');
        const digimonBox = document.getElementById('digimonBox');
        const selectedBg = bgSelect.value;

        if (selectedBg === "") {
            digimonBox.style.background = "#444";
        } else {
            bgSelect.blur();
            digimonBox.style.background = `url('${selectedBg}') no-repeat center`;
            digimonBox.style.backgroundSize = "cover";
        }
    }

    // モデル確認
    async function checkAvailableModels() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const modelListLog = document.getElementById('modelListLog');
        const errorLog = document.getElementById('errorLog');
        const modelSelectContainer = document.getElementById('modelSelectContainer');
        const modelSelect = document.getElementById('modelSelect');

        modelListLog.style.display = 'none';
        errorLog.style.display = 'none';

        if (!apiKey) {
            alert('APIキーを入力してからボタンを押してください！');
            return;
        }

        modelListLog.innerText = "確認中...";
        modelListLog.style.display = 'block';

        const url = `https://generativelanguage.googleapis.com/v1/models?key=${apiKey}`;

        try {
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`エラー (Status: ${response.status})`);
            }
            const data = await response.json();
            const availableModels = data.models.filter(m => m.supportedGenerationMethods.includes('generateContent'));
            
            modelSelect.innerHTML = '';
            availableModels.forEach(m => {
                const shortName = m.name.replace('models/', '');
                const option = document.createElement('option');
                option.value = shortName;
                option.text = shortName;
                modelSelect.appendChild(option);
            });

            if(modelSelect.querySelector('option[value="gemini-3.1-flash-lite"]')){
                 modelSelect.value = "gemini-3.1-flash-lite";
            }

            modelListLog.innerText = "【準備OK！】\nプルダウンからモデルを選んで会話を始めてください。";
            modelSelectContainer.style.display = 'block';
            setTimeout(() => { modelListLog.style.display = 'none'; }, 3000);

        } catch (error) {
            modelListLog.style.display = 'none';
            errorLog.innerText = `モデル情報の取得に失敗しました。\n詳細: ${error.message}`;
            errorLog.style.display = 'block';
        }
    }

    // メッセージ送信
    async function sendMessage() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const userInput = document.getElementById('userInput').value.trim();
        const dialogueText = document.getElementById('dialogueText');
        const digimonImage = document.getElementById('digimonImage');
        const errorLog = document.getElementById('errorLog');
        const modelSelect = document.getElementById('modelSelect');

        errorLog.style.display = 'none';
        errorLog.innerText = '';

        if (!apiKey) {
            alert('最初にGeminiのAPIキーを入力してください！');
            return;
        }
        if (!userInput) return;

        const selectedModel = modelSelect.value || 'gemini-3.1-flash-lite';
        const currentTrainerName = localStorage.getItem('trainerName') || "テイマー";

        // 動的なプロンプト置換（{NAME}を実際のユーザー名に置換）
        const activeInstruction = SYSTEM_INSTRUCTION.replace(/{NAME}/g, currentTrainerName);

        dialogueText.innerText = "考え中...";
        document.getElementById('userInput').value = "";
        document.getElementById('userInput').blur();

        const url = `https://generativelanguage.googleapis.com/v1/models/${selectedModel}:generateContent?key=${apiKey}`;

        const requestBody = {
            contents: [{
                parts: [{
                    text: `${activeInstruction}\n\n話しかけているトレーナーの名前: "${currentTrainerName}"\nUser: "${userInput}"\nYour Answer:`
                }]
            }]
        };

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
            });

            if (!response.ok) {
                const errData = await response.json().catch(() => ({}));
                throw new Error(`API通信エラー (Status: ${response.status})\nメッセージ: ${JSON.stringify(errData)}`);
            }

            const data = await response.json();
            const rawText = data.candidates[0].content.parts[0].text.trim();
            const cleanJsonText = rawText.replace(/```json|```/gi, "").trim();
            
            let result;
            try {
                result = JSON.parse(cleanJsonText);
            } catch (jsonErr) {
                throw new Error(`JSONの解析に失敗しました。`);
            }

            dialogueText.innerText = result.text;
            const emotion = result.emotion || 'normal';

            // 進化チェック＆画像切り替えロジック
            if (currentForm === 'botamon') {
                talkCount++;
                console.log("現在の会話回数: " + talkCount);

                if (talkCount >= 10) {
                    currentForm = 'koromon';
                    alert("ボタモンしんか～！");
                    document.getElementById('digimonName').innerText = "コロモン";
                    
                    // 進化時に新しい性格を再抽選！
                    rollRandomPersonality();
                    setInstructionForKoromon();

                    digimonImage.src = "koromon_normal.gif";
                    digimonImage.alt = "koromon_normal";
                    dialogueText.innerText = `ボタモンは コロモン に進化した！（せいかくが「${PERSONALITIES[currentPersonalityKey].name}」になったよ！）`;
                    
                } else {
                    digimonImage.src = `${emotion}.gif`;
                    digimonImage.alt = emotion;
                }
            } else {
                digimonImage.src = `koromon_${emotion}.gif`;
                digimonImage.alt = `koromon_${emotion}`;
            }

        } catch (error) {
            dialogueText.innerText = "エラーが発生しました。下のボックスを確認してください。";
            errorLog.innerText = error.message;
            errorLog.style.display = 'block';
        }
    }
</script>
